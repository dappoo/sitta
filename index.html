<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SITTA UT</title>
  <link rel="shortcut icon" href="assets/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<div id="toast"></div>
<body>

  <main class="login-container">
    <section class="login-card">
      <img src="assets/logo.png" alt="Logo Universitas Terbuka" class="logo">

      <h1>SITTA UT</h1>
      <p>Sistem Informasi Tracking & Bahan Ajar</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Masukkan email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password">
        </div>

        <button type="submit" class="btn">Login</button>
      </form>

      <div class="login-links">
        <button id="forgotBtn">Lupa Password</button>
        <button id="registerBtn">Daftar</button>
      </div>
    </section>
  </main>

  <div class="modal" id="forgotModal">
    <div class="modal-content">
      <span class="close" data-close="forgotModal">&times;</span>
      <h2>Lupa Password</h2>
      <p>Silakan hubungi administrator SITTA UT.</p>
    </div>
  </div>

  <div class="modal" id="registerModal">
    <div class="modal-content">
      <span class="close" data-close="registerModal">&times;</span>
      <h2>Daftar Akun</h2>
      <p>Pendaftaran akun dilakukan melalui admin pusat UT.</p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html
